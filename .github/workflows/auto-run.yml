name: ⚽ AI 自动预测机器人

on:
  schedule:
    # 这里的 30 1,13 代表 UTC 时间 1:30 和 13:30 (即北京时间 09:30 和 21:30)
    - cron: '30 1,13 * * *'
  workflow_dispatch: # 允许你在网页上手动点击强制运行

jobs:
  predict-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 拉取你的代码
        uses: actions/checkout@v4
        
      - name: 2. 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 3. 安装依赖工具
        run: pip install requests bs4 python-dotenv openai
        
      - name: 4. 运行双引擎 AI 预测
        env:
          # 从你的 GitHub Secrets 保险箱里读取 Key
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py
        
      - name: 5. 将最新的预测结果保存到你的仓库
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "ai-bot@your-website.com"
          git add data.json
          # 如果有新数据就提交，没有就不提交
          git commit -m "🤖 自动更新：最新赛事预测数据" || echo "今天暂无新数据"
          git push
