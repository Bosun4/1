<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体彩竞彩 AI 稳胆中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 md:p-8 font-sans">
    <div class="max-w-3xl mx-auto">
        <div class="flex items-center justify-between mb-6 border-b-2 border-red-600 pb-2">
            <h1 class="text-2xl font-black text-red-600">⚽ 今日竞彩 AI 核心推荐</h1>
            <span id="date-display" class="text-gray-400 text-xs font-mono"></span>
        </div>
        
        <div id="list-container" class="space-y-4">
            </div>

        <div class="mt-8 text-center text-gray-400 text-xs">
            聚合 500网/澳客网 实时数据 + GPT-5.2 多模型算法
        </div>
    </div>

    <script>
        fetch('data.json').then(r => r.json()).then(d => {
            document.getElementById('date-display').innerText = d.date;
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            d.predictions.forEach(p => {
                container.innerHTML += `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                    <div class="text-sm font-bold text-blue-600 mb-2 uppercase tracking-tight">${p.match.split(':')[0]}</div>
                    <div class="text-xl font-black text-gray-900 mb-4">${p.match.split(':')[1]}</div>
                    <div class="bg-red-50 p-4 rounded-lg border-l-4 border-red-500">
                        <div class="text-gray-700 leading-relaxed text-sm whitespace-pre-wrap">${p.text}</div>
                    </div>
                </div>`;
            });
        }).catch(e => {
            document.getElementById('list-container').innerHTML = '<p class="text-center py-10 text-gray-400">正在努力抓取竞彩赛事中，请稍后...</p>';
        });
    </script>
</body>
</html>
